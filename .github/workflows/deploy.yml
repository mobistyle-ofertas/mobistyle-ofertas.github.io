name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Ou a branch principal do seu repositório

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_INTENSE_DEBATE_ACCT: ${{ secrets.VITE_INTENSE_DEBATE_ACCT }}
          VITE_INTENSE_DEBATE_ID: ${{ secrets.VITE_INTENSE_DEBATE_ID }}
          VITE_INTENSE_DEBATE_KEY: ${{ secrets.VITE_INTENSE_DEBATE_KEY }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
